<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vesperstadt — Map Overlay</title>
<!--
  ╔══════════════════════════════════════════════════════════════════╗
  ║  VESPERSTADT — Interactive Map Overlay                           ║
  ║  Calibrated to: blackchurch-rotate2.png                         ║
  ║  Source image:  3600 × 2600 px                                  ║
  ║  SVG viewBox:   0 0 3600 2600                                   ║
  ║                                                                  ║
  ║  TO USE:                                                         ║
  ║  1. Replace src="YOUR_MAP_URL" with your hosted image            ║
  ║  2. Fine-tune polygon points in DevTools if needed               ║
  ║  3. Move landmark translate() values to match your painting      ║
  ║  4. Edit LORE{} object for all popup text + links                ║
  ║  5. Flip STAFF_MODE or swap in Jcink {membergroup} check         ║
  ╚══════════════════════════════════════════════════════════════════╝
-->
<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Inconsolata:wght@400;700&display=swap');

/* ── SITE TOKENS — remove block when embedding in Jcink ── */
:root {
  --font-serif:  "Cormorant Garamond", serif;
  --font-hand:   "Inconsolata", monospace;
  --font-cinzel: "Cinzel", serif;

  --bg-2:         oklch(0.1965 0.0026 67.68);
  --bg-3:         oklch(0.2492 0.0048 67.6);
  --text-hiCon:   oklch(0.9302 0.0137 78.26);
  --text-medCon:  oklch(0.81   0.0179 67.57);
  --text-loCon:   oklch(0.66   0.0196 64.79);
  --accent-1:     oklch(0.5686 0.1641 14.49);
  --accent-2:     oklch(0.5961 0.0424 75.85);

  --bm-guide-border:      oklch(1 0 0 / 0.12);
  --bm-guide-border-soft: oklch(1 0 0 / 0.06);
  --bm-guide-rule:        oklch(1 0 0 / 0.08);
  --bm-guide-shadow:      0 2px 12px oklch(0 0 0 / 0.3), 0 1px 3px oklch(0 0 0 / 0.2);
  --bm-guide-accent:      var(--accent-1);
  --bm-guide-accent-soft: color-mix(in oklch, var(--accent-1) 25%, transparent);
  --transi-quick: all 0.3s ease-in-out;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg-2);
  font-family: var(--font-serif);
  color: var(--text-hiCon);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 2rem 1rem 4rem;
  gap: 1rem;
}

/* ── MAP CONTAINER ── */
.vesper-map {
  position: relative;
  width: 100%;
  max-width: 1200px;
  /* 3600:2600 = 18:13 ratio */
  aspect-ratio: 18 / 13;
  border: 1px solid var(--bm-guide-border);
  box-shadow: var(--bm-guide-shadow);
  overflow: hidden;
  border-radius: 4px;
  background: oklch(0.12 0.002 67);
  /* Grab cursor when not dragging */
  cursor: grab;
}
.vesper-map.is-dragging { cursor: grabbing; }

/* ── VIEWPORT — the layer that gets transformed ── */
.vesper-map__viewport {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  transform-origin: 0 0;
  /* JS sets transform: translate(x,y) scale(z) */
  will-change: transform;
}

.vesper-map__img {
  display: block;
  width: 100%;
  height: 100%;
  object-fit: cover;
  object-position: center;
  user-select: none;
  -webkit-user-drag: none;
  pointer-events: none;
}

.vesper-map__svg {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  overflow: visible;
}

/* ── ZOOM CONTROLS — fixed to container, outside viewport ── */
.vm-controls {
  position: absolute;
  bottom: 14px;
  right: 14px;
  z-index: 100;
  display: flex;
  flex-direction: column;
  gap: 3px;
}
.vm-ctrl-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 28px;
  height: 28px;
  background: var(--bg-2);
  border: 1px solid var(--bm-guide-border);
  color: var(--text-loCon);
  font-family: var(--font-hand);
  font-size: 14px;
  line-height: 1;
  cursor: pointer;
  border-radius: 3px;
  transition: color 0.15s, border-color 0.15s, background 0.15s;
  user-select: none;
  -webkit-user-select: none;
}
.vm-ctrl-btn:hover {
  color: var(--text-hiCon);
  border-color: var(--bm-guide-accent);
  background: oklch(1 0 0 / 0.05);
}
.vm-ctrl-btn:active { background: oklch(1 0 0 / 0.1); }

/* Zoom level indicator */
.vm-zoom-label {
  font-family: var(--font-hand);
  font-size: 8px;
  letter-spacing: 0.1em;
  color: var(--text-loCon);
  text-align: center;
  opacity: 0.6;
  margin-top: 1px;
}

/* ── ZONES ── */
.vm-zone {
  fill: color-mix(in oklch, var(--zone-color, var(--accent-2)) 60%, transparent);;
  stroke: transparent;
  cursor: pointer;
  transition: fill 0.25s ease, stroke 0.25s ease;
}
.vm-zone:hover,
.vm-zone.is-active {
  fill: color-mix(in oklch, var(--zone-color, var(--accent-2)) 80%, transparent);
  stroke: color-mix(in oklch, var(--zone-color, var(--accent-2)) 100%, transparent);
  stroke-width: 2;
  stroke-linejoin: round;
  stroke-dasharray: 6 4;
}

/* ── PINS ── */
.vm-pin {
  cursor: pointer;
}
.vm-pin__halo {
  fill: color-mix(in oklch, var(--pin-color, var(--accent-1)) 20%, transparent);
  opacity: 0;
  transition: opacity 0.2s ease;
}
.vm-pin__dot {
  fill: var(--pin-color, var(--accent-1));
  stroke: oklch(0.10 0.002 67 / 0.7);
  stroke-width: 1.2;
  transition: r 0.15s ease;
}
.vm-pin__ring {
  fill: none;
  stroke: color-mix(in oklch, var(--pin-color, var(--accent-1)) 55%, transparent);
  stroke-width: 1;
}
.vm-pin:hover .vm-pin__halo,
.vm-pin.is-active .vm-pin__halo { opacity: 1; }

/* Staff pins hidden by default */
.vm-pin--staff { display: none; }
.vesper-map.staff-visible .vm-pin--staff { display: block; }
.vm-pin--staff .vm-pin__dot {
  stroke-dasharray: 3 2;
  stroke-width: 1.5;
  stroke: var(--pin-color, var(--accent-1));
  fill: oklch(0.12 0.002 67 / 0.85);
}

/* ── POPUP ── */
.vm-popup {
  position: absolute;
  z-index: 50;
  width: 240px;
  background: var(--bg-2);
  border: 1px solid var(--bm-guide-border);
  border-top: 2px solid var(--bm-guide-accent);
  box-shadow: var(--bm-guide-shadow);
  border-radius: 0 0 4px 4px;
  padding: 0.75rem 0.9rem 0.85rem;
  pointer-events: none;
  opacity: 0;
  transform: translateY(5px);
  transition: opacity 0.2s ease, transform 0.2s ease;
  visibility: hidden;
}
.vm-popup.is-visible {
  opacity: 1;
  transform: translateY(0);
  visibility: visible;
  pointer-events: auto;
}
.vm-popup__kicker {
  font-family: var(--font-hand);
  font-size: 9px;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--text-loCon);
  margin-bottom: 4px;
  opacity: 0.75;
}
.vm-popup__name {
  font-family: var(--font-cinzel);
  font-size: 13px;
  font-weight: 600;
  letter-spacing: 0.05em;
  color: var(--text-hiCon);
  margin-bottom: 7px;
  line-height: 1.25;
}
.vm-popup__rule {
  width: 100%;
  height: 1px;
  background: var(--bm-guide-rule);
  margin-bottom: 8px;
  border: none;
}
.vm-popup__body {
  font-family: var(--font-serif);
  font-size: 12px;
  font-style: italic;
  line-height: 1.65;
  color: var(--text-medCon);
}
.vm-popup__link {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  margin-top: 9px;
  font-family: var(--font-hand);
  font-size: 9px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--bm-guide-accent);
  text-decoration: none;
  opacity: 0.85;
  transition: opacity 0.2s;
}
.vm-popup__link:hover { opacity: 1; }
.vm-popup__link::after { content: " →"; }
.vm-popup__staff-badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-family: var(--font-hand);
  font-size: 8px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--accent-1);
  opacity: 0.7;
  margin-bottom: 6px;
}
.vm-popup__staff-badge::before { content: "◆ "; font-size: 6px; }
.vm-popup__close {
  position: absolute;
  top: 5px; right: 8px;
  background: none;
  border: none;
  color: var(--text-loCon);
  font-size: 14px;
  cursor: pointer;
  opacity: 0.5;
  transition: opacity 0.15s;
  padding: 2px;
  line-height: 1;
}
.vm-popup__close:hover { opacity: 1; }

/* ── LEGEND ── */
.vesper-legend {
  width: 100%;
  max-width: 1200px;
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(155px, 1fr));
  gap: 5px 10px;
}
.vesper-legend__item {
  display: flex;
  align-items: center;
  gap: 7px;
  font-family: var(--font-hand);
  font-size: 10px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--text-loCon);
  cursor: pointer;
  padding: 5px 8px;
  border: 1px solid transparent;
  border-radius: 3px;
  transition: var(--transi-quick);
}
.vesper-legend__item:hover {
  color: var(--text-hiCon);
  border-color: var(--bm-guide-border-soft);
  background: oklch(1 0 0 / 0.03);
}
.vesper-legend__swatch {
  width: 8px; height: 8px;
  border-radius: 2px;
  flex-shrink: 0;
  opacity: 0.85;
}
</style>
</head>

<script>
// ── STAFF MODE ──────────────────────────────────────────────────
// Jcink version:  const STAFF_MODE = '{membergroup}' === 'Staff';
const STAFF_MODE = false;
if (STAFF_MODE) document.getElementById('vesperMap').classList.add('staff-visible');

// ── PAN & ZOOM ──────────────────────────────────────────────────
const mapEl    = document.getElementById('vesperMap');
const viewport = document.getElementById('vmViewport');
const zoomLabel= document.getElementById('vmZoomLabel');

const ZOOM_MIN = 1;      // can't zoom out past 1× (full map visible)
const ZOOM_MAX = 4;      // max 4× zoom
const ZOOM_STEP = 0.25;  // button step size

let vp = { x: 0, y: 0, z: 1 }; // current pan (x,y) and zoom (z)

function clampPan(x, y, z) {
  // Prevent panning outside map bounds
  const rect = mapEl.getBoundingClientRect();
  const maxX = 0;
  const minX = rect.width  * (1 - z);
  const maxY = 0;
  const minY = rect.height * (1 - z);
  return {
    x: Math.min(maxX, Math.max(minX, x)),
    y: Math.min(maxY, Math.max(minY, y)),
  };
}

function applyTransform(animate) {
  if (animate) {
    viewport.style.transition = 'transform 0.2s ease';
    setTimeout(() => viewport.style.transition = '', 220);
  } else {
    viewport.style.transition = '';
  }
  viewport.style.transform = `translate(${vp.x}px, ${vp.y}px) scale(${vp.z})`;
  zoomLabel.textContent = `${Math.round(vp.z * 100)}%`;
}

function zoomTo(newZ, originX, originY) {
  // originX/Y are in container px — zoom toward that point
  const rect = mapEl.getBoundingClientRect();
  const ox = (originX ?? rect.width  / 2);
  const oy = (originY ?? rect.height / 2);
  const clampedZ = Math.min(ZOOM_MAX, Math.max(ZOOM_MIN, newZ));
  // Scale the pan offset to keep the origin point stable
  const scale = clampedZ / vp.z;
  const newX  = ox - scale * (ox - vp.x);
  const newY  = oy - scale * (oy - vp.y);
  const clamped = clampPan(newX, newY, clampedZ);
  vp = { x: clamped.x, y: clamped.y, z: clampedZ };
  applyTransform(true);
}

function resetView() {
  vp = { x: 0, y: 0, z: 1 };
  applyTransform(true);
}

// ── SCROLL TO ZOOM ──
mapEl.addEventListener('wheel', e => {
  e.preventDefault();
  const rect = mapEl.getBoundingClientRect();
  const mouseX = e.clientX - rect.left;
  const mouseY = e.clientY - rect.top;
  const delta  = e.deltaY < 0 ? ZOOM_STEP : -ZOOM_STEP;
  zoomTo(vp.z + delta, mouseX, mouseY);
}, { passive: false });

// ── BUTTON CONTROLS ──
document.getElementById('vmZoomIn').addEventListener('click',    () => zoomTo(vp.z + ZOOM_STEP));
document.getElementById('vmZoomOut').addEventListener('click',   () => zoomTo(vp.z - ZOOM_STEP));
document.getElementById('vmZoomReset').addEventListener('click', () => resetView());

// ── CLICK-DRAG TO PAN ──
let drag = { active: false, startX: 0, startY: 0, startPanX: 0, startPanY: 0 };

mapEl.addEventListener('mousedown', e => {
  // Don't initiate drag on controls or popup
  if (e.target.closest('.vm-controls') || e.target.closest('.vm-popup')) return;
  drag = { active: true, startX: e.clientX, startY: e.clientY, startPanX: vp.x, startPanY: vp.y };
  mapEl.classList.add('is-dragging');
  e.preventDefault();
});

window.addEventListener('mousemove', e => {
  if (!drag.active) return;
  const dx = e.clientX - drag.startX;
  const dy = e.clientY - drag.startY;
  const clamped = clampPan(drag.startPanX + dx, drag.startPanY + dy, vp.z);
  vp.x = clamped.x; vp.y = clamped.y;
  applyTransform(false);
});

window.addEventListener('mouseup', () => {
  drag.active = false;
  mapEl.classList.remove('is-dragging');
});

// ── TOUCH: pinch to zoom + drag ──
let touch = { lastDist: null, lastX: null, lastY: null };

mapEl.addEventListener('touchstart', e => {
  if (e.touches.length === 2) {
    touch.lastDist = Math.hypot(
      e.touches[0].clientX - e.touches[1].clientX,
      e.touches[0].clientY - e.touches[1].clientY
    );
  } else if (e.touches.length === 1) {
    touch.lastX = e.touches[0].clientX;
    touch.lastY = e.touches[0].clientY;
  }
}, { passive: true });

mapEl.addEventListener('touchmove', e => {
  if (e.touches.length === 2) {
    e.preventDefault();
    const dist = Math.hypot(
      e.touches[0].clientX - e.touches[1].clientX,
      e.touches[0].clientY - e.touches[1].clientY
    );
    if (touch.lastDist) {
      const midX = (e.touches[0].clientX + e.touches[1].clientX) / 2;
      const midY = (e.touches[0].clientY + e.touches[1].clientY) / 2;
      const rect  = mapEl.getBoundingClientRect();
      zoomTo(vp.z * (dist / touch.lastDist), midX - rect.left, midY - rect.top);
    }
    touch.lastDist = dist;
  } else if (e.touches.length === 1 && touch.lastX !== null) {
    const dx = e.touches[0].clientX - touch.lastX;
    const dy = e.touches[0].clientY - touch.lastY;
    const clamped = clampPan(vp.x + dx, vp.y + dy, vp.z);
    vp.x = clamped.x; vp.y = clamped.y;
    applyTransform(false);
    touch.lastX = e.touches[0].clientX;
    touch.lastY = e.touches[0].clientY;
  }
}, { passive: false });

mapEl.addEventListener('touchend', () => {
  touch = { lastDist: null, lastX: null, lastY: null };
}, { passive: true });

// ── POPUP LOGIC ─────────────────────────────────────────────────
// Popup lives OUTSIDE the viewport so it doesn't zoom with the map.
// Position is calculated from clientX/Y → container-relative coords.
const popup    = document.getElementById('vmPopup');
const pKicker  = document.getElementById('vmPopupKicker');
const pName    = document.getElementById('vmPopupName');
const pBody    = document.getElementById('vmPopupBody');
const closeBtn = document.getElementById('vmPopupClose');
let   activeEl = null;

function showPopup(el, lore, clientX, clientY) {
  if (activeEl && activeEl !== el) activeEl.classList.remove('is-active');
  activeEl = el;
  el.classList.add('is-active');

  const staffBadge = lore.staff && STAFF_MODE
    ? `<div class="vm-popup__staff-badge">Staff visibility only</div>` : '';
  const link = lore.url && lore.url !== '#'
    ? `<a class="vm-popup__link" href="${lore.url}">Read full lore</a>` : '';

  pKicker.textContent = lore.kicker || '';
  pName.textContent   = lore.name   || '';
  pBody.innerHTML     = staffBadge + lore.body + link;

  // Position relative to container, not viewport (popup doesn't pan/zoom)
  const mapRect = mapEl.getBoundingClientRect();
  const PAD = 16, PW = 240;
  const PH  = popup.offsetHeight || 170;
  let left  = clientX - mapRect.left + PAD;
  let top   = clientY - mapRect.top  + PAD;
  if (left + PW + PAD > mapRect.width)  left = clientX - mapRect.left - PW - PAD;
  if (top  + PH + PAD > mapRect.height) top  = clientY - mapRect.top  - PH - PAD;

  popup.style.left = `${Math.max(PAD, left)}px`;
  popup.style.top  = `${Math.max(PAD, top)}px`;
  popup.classList.add('is-visible');
}

function hidePopup() {
  popup.classList.remove('is-visible');
  if (activeEl) { activeEl.classList.remove('is-active'); activeEl = null; }
}

closeBtn.addEventListener('click', hidePopup);

// Hide popup on click outside — but only if not dragging
let didDrag = false;
mapEl.addEventListener('mousedown', () => { didDrag = false; });
window.addEventListener('mousemove', () => { if (drag.active) didDrag = true; });

mapEl.addEventListener('click', e => {
  if (didDrag) return; // was a pan, not a click
  if (!e.target.closest('.vm-zone') &&
      !e.target.closest('.vm-pin')  &&
      !e.target.closest('.vm-popup') &&
      !e.target.closest('.vm-controls')) hidePopup();
});

document.querySelectorAll('.vm-zone, .vm-pin').forEach(el => {
  el.addEventListener('click', e => {
    if (didDrag) return;
    e.stopPropagation();
    const lore = LORE[el.dataset.id];
    if (!lore) return;
    if (lore.staff && !STAFF_MODE) return;
    showPopup(el, lore, e.clientX, e.clientY);
  });
});
